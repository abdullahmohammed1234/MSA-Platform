---
deployment:
  tasks:
    # 1. Sync the Laravel backend to a secure folder outside public_html
    - /bin/mkdir -p /home2/sfums1d5/msa-backend
    - /bin/rsync -avz --exclude='node_modules' --exclude='.git' backend/ /home2/sfums1d5/msa-backend/

    # 2. Build the Vue.js frontend (Requires Nodejs/NPM enabled in cPanel)
    - cd frontend && npm install && npm run build

    # 3. Deploy the compiled Vue build directly to public_html
    - /bin/rsync -avz dist/ /home2/sfums1d5/