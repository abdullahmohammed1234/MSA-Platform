name: SFU MSA Platform - CI Testing Pipeline

on:
  push:
    branches: [ main, staging ]
  pull_request:
    branches: [ main, staging ]

jobs:
  backend-tests:
    name: Backend Service Tests (Laravel)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
          MYSQL_DATABASE: msa_testing
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP Environment
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, mysql, bcmath, gd
          coverage: none

      - name: Install Composer Dependencies
        run: |
          cd backend
          composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Prepare Environment File
        run: |
          cd backend
          cp .env.example .env.testing
          sed -i 's/DB_CONNECTION=mysql/DB_CONNECTION=mysql/g' .env.testing
          sed -i 's/DB_HOST=127.0.0.1/DB_HOST=127.0.0.1/g' .env.testing
          sed -i 's/DB_PORT=3306/DB_PORT=3306/g' .env.testing
          sed -i 's/DB_DATABASE=laravel/DB_DATABASE=msa_testing/g' .env.testing
          sed -i 's/DB_USERNAME=root/DB_USERNAME=root/g' .env.testing
          sed -i 's/DB_PASSWORD=/DB_PASSWORD=/g' .env.testing

      - name: Generate Application Key
        run: |
          cd backend
          php artisan key:generate --env=testing

      - name: Run Database Migrations
        run: |
          cd backend
          php artisan migrate --env=testing --force

      - name: Run PHPUnit Test Suite
        run: |
          cd backend
          php artisan test

  frontend-tests:
    name: Frontend Application Tests (Vue 3)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Node Dependencies
        run: |
          cd frontend
          npm ci

      - name: Run Linter & Type Check
        run: |
          cd frontend
          npm run build

      - name: Run Vitest Unit Tests
        run: |
          cd frontend
          npm run test:unit
